<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라자다 분실관리 어드민</title>
  <style>
    :root {
      --primary:#3f434b;
      --primary-hover:#2f333a;
      --bg:#f1f1f1;
      --card:#fff;
      --border:#c5c7cf;
      --text:#111827;
      --subtext:#4b5563;
      --link:#204da7;
      --thead1:#737595;
      --thead2:#545773;
      --even:#fbfbfd;
      --hover:#eef2f8;
      --nav:#33383d;
      --nav-active:#2b66c8;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:'Noto Sans KR', Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      font-size:12px;
    }
    .eopm-topbar { height:42px; background:var(--nav); color:#fff; display:flex; align-items:stretch; }
    .eopm-logo { width:120px; padding:0 18px; font-size:24px; font-weight:800; display:flex; align-items:center; }
    .eopm-menu { display:flex; flex:1; }
    .eopm-menu-item { min-width:130px; display:flex; align-items:center; justify-content:center; border-left:1px solid rgba(255,255,255,.08); color:#fff; font-size:14px; font-weight:700; }
    .eopm-menu-item.active { background:var(--nav-active); }
    .eopm-user { display:flex; align-items:center; gap:10px; padding:0 16px; font-size:11px; }
    .eopm-logout { border:1px solid #666; background:#4a4d53; color:#fff; height:24px; padding:0 10px; }
    .page { padding:12px; }
    .card { background:var(--card); border:1px solid var(--border); padding:10px 12px; margin-bottom:8px; }
    .section-title { margin:6px 0 6px; font-size:14px; font-weight:700; }
    .muted, .list-meta { color:var(--subtext); }
    .list-meta { font-size:11px; margin-top:2px; }
    .filter-row, .filter-actions, .bulk-actions, .list-header, .list-tools, .inline-group, .checkbox-group { display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center; }
    .filter-row { margin-bottom:4px; }
    .filter-label { min-width:110px; font-weight:700; }
    .filter-control { flex:1; min-width:260px; }
    input[type="text"], input[type="date"], select, textarea { border:1px solid #b9bcc5; padding:4px 6px; font:inherit; color:inherit; background:#fff; }
    input[type="text"], input[type="date"], select { height:24px; padding:0 6px; }
    textarea { resize:vertical; }
    button { height:24px; border:1px solid #6b7280; padding:0 10px; font:inherit; cursor:pointer; }
    button:disabled { opacity:.45; cursor:default; }
    .btn-primary { background:var(--primary); color:#fff; border-color:#2d3137; }
    .btn-primary:hover:not(:disabled) { background:var(--primary-hover); }
    .btn-secondary { background:linear-gradient(180deg,#fff 0%,#eceef2 100%); color:#2f3440; border-color:#9da3ad; }
    .btn-small { height:22px; }
    .w-320 { min-width:320px; }
    .w-260 { min-width:260px; }
    .w-440 { min-width:440px; }
    .checkbox-group label { display:inline-flex; align-items:center; gap:6px; color:var(--subtext); }
    .bulk-actions, .list-header { justify-content:space-between; margin-bottom:6px; }
    .filter-actions { margin-top:4px; }
    .pill { display:inline-flex; align-items:center; padding:2px 8px; border:1px solid #cfd4dc; background:#eef1f6; color:#111; font-size:11px; font-weight:700; }
    .table-wrap { overflow-x:auto; border:1px solid var(--border); background:#fff; }
    table { width:100%; min-width:1760px; border-collapse:collapse; }
    th, td { padding:6px 8px; border-right:1px solid #c9ccd4; border-bottom:1px solid #d6d8df; text-align:left; white-space:nowrap; }
    th:last-child, td:last-child { border-right:none; }
    th { background:linear-gradient(180deg,var(--thead1) 0%,var(--thead2) 100%); color:#fff; font-weight:400; }
    tbody tr:nth-child(even) { background:var(--even); }
    tbody tr:hover { background:var(--hover); }
    .center { text-align:center; }
    .right { text-align:right; }
    .badge { display:inline-flex; align-items:center; padding:2px 6px; border:1px solid #c9ccd4; font-size:11px; font-weight:700; color:#111; }
    .pagination { display:flex; justify-content:center; gap:4px; margin-top:8px; flex-wrap:wrap; }
    .page-btn { min-width:20px; height:18px; border:1px solid #aab0ba; background:#fff; color:#4b5563; padding:0 4px; }
    .page-btn.active { background:#5b5f78; border-color:#4b5068; color:#fff; }
    .toast {
      position:fixed;
      right:16px;
      bottom:16px;
      background:rgba(17,24,39,.94);
      color:#fff;
      padding:10px 12px;
      font-size:12px;
      opacity:0;
      transform:translateY(12px);
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      z-index:1100;
    }
    .toast.show { opacity:1; transform:translateY(0); }
    .modal-bg { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
    .modal-bg.show { display:flex; }
    .modal { background:#fff; width:500px; max-width:90%; padding:20px; border:1px solid var(--border); }
    .modal h3 { margin:0 0 12px; font-size:16px; }
    .modal-info { padding:10px; background:#f7f7f8; border:1px solid #e0e0e0; margin-bottom:14px; font-size:12px; color:#4b5563; }
    .modal-row { display:grid; grid-template-columns:110px 1fr; gap:8px 12px; align-items:center; margin-bottom:10px; }
    .modal-row label { font-weight:700; }
    .modal-row select, .modal-row input { height:28px; width:100%; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid #e0e0e0; }
    @media (max-width:900px) {
      .filter-label { min-width:100%; }
      .filter-control { min-width:100%; }
    }
  </style>
</head>
<body>
  <div class="eopm-topbar">
    <div class="eopm-logo">EOPM</div>
    <div class="eopm-menu">
      <div class="eopm-menu-item">입고</div>
      <div class="eopm-menu-item">합포장</div>
      <div class="eopm-menu-item">발송</div>
      <div class="eopm-menu-item active">기타</div>
      <div class="eopm-menu-item">관리</div>
    </div>
    <div class="eopm-user">
      <span>soomchoi 님</span>
      <button type="button" class="eopm-logout">로그아웃</button>
    </div>
  </div>

  <div class="page">
    <section class="card">
      <h1 style="margin:0 0 8px; font-size:16px;">라자다 분실관리</h1>
      <div class="filter-row">
        <div class="filter-label">주문번호</div>
        <div class="filter-control"><textarea id="orderNo" rows="2" class="w-440" placeholder="주문번호 입력 (복수 검색은 콤마 또는 줄바꿈으로 구분)"></textarea></div>
      </div>
      <div class="filter-row">
        <div class="filter-label">판매자 ID</div>
        <div class="filter-control inline-group">
          <input type="text" id="sellerId" class="w-260" placeholder="판매자 ID 입력">
          <select id="orderType">
            <option value="all">전체 주문유형</option>
            <option value="Lazada">Lazada</option>
            <option value="Daraz">Daraz</option>
          </select>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">분실확정 여부</div>
        <div class="filter-control checkbox-group">
          <label><input type="checkbox" name="lossStatus" value="all" checked> 전체</label>
          <label><input type="checkbox" name="lossStatus" value="confirmed"> 분실확정만</label>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">린코스 입고스캔일</div>
        <div class="filter-control inline-group">
          <input type="date" id="dateFrom">
          <span class="muted">~</span>
          <input type="date" id="dateTo">
        </div>
      </div>
      <div class="filter-actions">
        <button type="button" id="btnSearch" class="btn-primary">검색</button>
        <button type="button" id="btnReset" class="btn-secondary">초기화</button>
      </div>
    </section>

    <section class="card">
      <div class="bulk-actions">
        <div class="inline-group">
          <button type="button" id="btnMarkConfirmed" class="btn-primary">분실확정</button>
        </div>
      </div>
      <div class="list-header">
        <div>
          <div style="font-weight:700; font-size:13px;">라자다 분실관리 목록 (총 <span id="totalCount">0</span>건)</div>
        </div>
        <div class="list-tools">
          <select id="sortOrder">
            <option value="default">기본 정렬 (분실확정 안된건 + 경과일 내림차순)</option>
            <option value="elapsedDesc">경과일 내림차순</option>
            <option value="elapsedAsc">경과일 오름차순</option>
          </select>
          <button type="button" id="btnExcel" class="btn-secondary btn-small">엑셀다운</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="center" style="width:56px;">선택</th>
              <th>주문번호</th>
              <th>주문유형</th>
              <th>판매자 ID</th>
              <th>반품상태</th>
              <th>분실확정</th>
              <th>분실귀책</th>
              <th>분실확정일시</th>
              <th>상세 메모</th>
              <th class="center">마지막 스캔 경과일</th>
              <th>린코스 입고스캔일시</th>
              <th>린코스 도착스캔일시</th>
              <th>라자다 입고처리일시</th>
              <th>린코스 회수스캔일시</th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>
      <div id="pagination" class="pagination"></div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="confirmModal" class="modal-bg">
    <div class="modal">
      <h3>분실확정</h3>
      <div class="modal-info" id="confirmModalInfo"></div>
      <div class="modal-row">
        <label>분실귀책</label>
        <select id="confirmFaultOwner">
          <option value="">선택하세요</option>
          <option value="lynkos">린코스</option>
          <option value="lazada">라자다</option>
        </select>
      </div>
      <div class="modal-row">
        <label>상세 메모</label>
        <input type="text" id="confirmMemo" placeholder="CS 인계용 상세 메모 (선택)">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="btnConfirmCancel">취소</button>
        <button type="button" class="btn-primary" id="btnConfirmSubmit">분실확정</button>
      </div>
    </div>
  </div>

  <script>
    const faultOwnerMap = {
      lynkos: '린코스',
      lazada: '라자다'
    };

    const lossStatusLabel = {
      pending: '-',
      confirmed: '분실확정'
    };

    const state = {
      items: [],
      toastTimer: null,
      page: 1,
      pageSize: 10,
      sortOrder: 'default',
      selectedId: ''
    };

    const elements = {
      orderNo: document.getElementById('orderNo'),
      sellerId: document.getElementById('sellerId'),
      orderType: document.getElementById('orderType'),
      dateFrom: document.getElementById('dateFrom'),
      dateTo: document.getElementById('dateTo'),
      lossStatusBoxes: Array.from(document.querySelectorAll('input[name="lossStatus"]')),
      btnSearch: document.getElementById('btnSearch'),
      btnReset: document.getElementById('btnReset'),
      btnMarkConfirmed: document.getElementById('btnMarkConfirmed'),
      sortOrder: document.getElementById('sortOrder'),
      btnExcel: document.getElementById('btnExcel'),
      listBody: document.getElementById('listBody'),
      totalCount: document.getElementById('totalCount'),
      pagination: document.getElementById('pagination'),
      toast: document.getElementById('toast'),
      confirmModal: document.getElementById('confirmModal'),
      confirmModalInfo: document.getElementById('confirmModalInfo'),
      confirmFaultOwner: document.getElementById('confirmFaultOwner'),
      confirmMemo: document.getElementById('confirmMemo'),
      btnConfirmCancel: document.getElementById('btnConfirmCancel'),
      btnConfirmSubmit: document.getElementById('btnConfirmSubmit')
    };

    function parseOrderNos(value) {
      return value.split(/[\s,]+/).map(item => item.trim()).filter(Boolean);
    }
    function parseCsv(value) { return value.split(',').map(item => item.trim()).filter(Boolean); }
    function parseDatePart(value) { return value && value !== '-' ? value.slice(0, 10) : ''; }

    function showToast(message) {
      elements.toast.textContent = message;
      elements.toast.classList.add('show');
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => elements.toast.classList.remove('show'), 2500);
    }

    function getSelectedStatusValues() {
      return elements.lossStatusBoxes.find(box => box.value === 'all' && box.checked)
        ? ['all']
        : elements.lossStatusBoxes.filter(box => box.checked).map(box => box.value);
    }

    function handleStatusGroup(changed) {
      if (changed.value === 'all' && changed.checked) {
        elements.lossStatusBoxes.forEach(box => { box.checked = box.value === 'all'; });
        return;
      }
      if (changed.value !== 'all' && changed.checked) {
        elements.lossStatusBoxes.find(box => box.value === 'all').checked = false;
      }
      const checked = elements.lossStatusBoxes.filter(box => box.value !== 'all' && box.checked);
      if (!checked.length) {
        elements.lossStatusBoxes.forEach(box => { box.checked = box.value === 'all'; });
      }
    }

    function createMockData() {
      return [
        {
          id: 'loss-1',
          orderNo: '4407000101',
          orderType: 'Lazada',
          sellerId: 'seller02',
          returnStatus: '-',
          lossStatus: 'pending',
          faultOwner: '',
          lossConfirmDate: '-',
          lossMemo: '',
          elapsedDays: 12,
          lynkosInboundScanDate: '2026-05-13 09:06',
          lynkosArrivalScanDate: '-',
          lazadaInboundDate: '-',
          lynkosRecoveryScanDate: '-'
        },
        {
          id: 'loss-2',
          orderNo: '4407000102',
          orderType: 'Lazada',
          sellerId: 'seller03',
          returnStatus: '-',
          lossStatus: 'pending',
          faultOwner: '',
          lossConfirmDate: '-',
          lossMemo: '',
          elapsedDays: 9,
          lynkosInboundScanDate: '2026-05-15 09:12',
          lynkosArrivalScanDate: '2026-05-15 12:15',
          lazadaInboundDate: '-',
          lynkosRecoveryScanDate: '-'
        },
        {
          id: 'loss-3',
          orderNo: '4407000103',
          orderType: 'Lazada',
          sellerId: 'seller04',
          returnStatus: '-',
          lossStatus: 'pending',
          faultOwner: '',
          lossConfirmDate: '-',
          lossMemo: '',
          elapsedDays: 7,
          lynkosInboundScanDate: '2026-05-18 09:09',
          lynkosArrivalScanDate: '2026-05-18 12:15',
          lazadaInboundDate: '2026-05-20 14:06',
          lynkosRecoveryScanDate: '-'
        },
        {
          id: 'loss-4',
          orderNo: '4407000104',
          orderType: 'Lazada',
          sellerId: 'seller05',
          returnStatus: '반품신청',
          lossStatus: 'pending',
          faultOwner: '',
          lossConfirmDate: '-',
          lossMemo: '',
          elapsedDays: 6,
          lynkosInboundScanDate: '2026-05-19 09:15',
          lynkosArrivalScanDate: '2026-05-19 12:25',
          lazadaInboundDate: '2026-05-21 14:10',
          lynkosRecoveryScanDate: '2026-05-22 17:30'
        },
        {
          id: 'loss-5',
          orderNo: '4407000105',
          orderType: 'Lazada',
          sellerId: 'seller06',
          returnStatus: '-',
          lossStatus: 'confirmed',
          faultOwner: 'lynkos',
          lossConfirmDate: '2026-05-25 11:05',
          lossMemo: '린코스 입고스캔 후 도착스캔 미발생, 창고 재확인 결과 미확인',
          elapsedDays: 14,
          lynkosInboundScanDate: '2026-05-11 09:18',
          lynkosArrivalScanDate: '-',
          lazadaInboundDate: '-',
          lynkosRecoveryScanDate: '-'
        },
        {
          id: 'loss-6',
          orderNo: '4407000106',
          orderType: 'Lazada',
          sellerId: 'seller07',
          returnStatus: '반품신청',
          lossStatus: 'confirmed',
          faultOwner: 'lazada',
          lossConfirmDate: '2026-05-28 10:23',
          lossMemo: '라자다 입고처리까지 정상, 회수스캔 미발생. 라자다 측 회송 누락 확인 필요',
          elapsedDays: 10,
          lynkosInboundScanDate: '2026-05-15 09:18',
          lynkosArrivalScanDate: '2026-05-15 12:30',
          lazadaInboundDate: '2026-05-17 11:00',
          lynkosRecoveryScanDate: '-'
        }
      ];
    }

    function filterItems() {
      const orderNos = parseOrderNos(elements.orderNo.value);
      const sellerIds = parseCsv(elements.sellerId.value).map(item => item.toLowerCase());
      const orderType = elements.orderType.value;
      const statuses = getSelectedStatusValues();
      const from = elements.dateFrom.value;
      const to = elements.dateTo.value;
      return state.items.filter(item => {
        const inboundDate = parseDatePart(item.lynkosInboundScanDate);
        if (orderNos.length && !orderNos.includes(item.orderNo)) return false;
        if (sellerIds.length && !sellerIds.includes(String(item.sellerId).toLowerCase())) return false;
        if (orderType !== 'all' && item.orderType !== orderType) return false;
        if (!statuses.includes('all') && !statuses.includes(item.lossStatus)) return false;
        if (from && (!inboundDate || inboundDate < from)) return false;
        if (to && (!inboundDate || inboundDate > to)) return false;
        return true;
      });
    }

    function sortItems(items) {
      const sorted = [...items];
      const statusRank = { pending: 0, confirmed: 1 };
      if (state.sortOrder === 'default') {
        sorted.sort((a, b) => {
          const rankDiff = statusRank[a.lossStatus] - statusRank[b.lossStatus];
          if (rankDiff !== 0) return rankDiff;
          return b.elapsedDays - a.elapsedDays;
        });
      }
      if (state.sortOrder === 'elapsedDesc') sorted.sort((a, b) => b.elapsedDays - a.elapsedDays);
      if (state.sortOrder === 'elapsedAsc') sorted.sort((a, b) => a.elapsedDays - b.elapsedDays);
      return sorted;
    }

    function paginateItems(items) {
      const totalPages = Math.max(1, Math.ceil(items.length / state.pageSize));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * state.pageSize;
      return { totalPages, totalCount: items.length, pageItems: items.slice(start, start + state.pageSize) };
    }

    function renderPagination(currentPage, totalPages) {
      const numbers = [];
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);
      for (let page = start; page <= end; page += 1) numbers.push(page);
      function button(label, page, disabled, active) {
        return '<button type="button" class="page-btn' + (active ? ' active' : '') + '" data-page="' + page + '"' + (disabled ? ' disabled' : '') + '>' + label + '</button>';
      }
      elements.pagination.innerHTML = [
        button('|<', 1, currentPage === 1, false),
        button('<', currentPage - 1, currentPage === 1, false),
        ...numbers.map(page => button(String(page), page, false, currentPage === page)),
        button('>', currentPage + 1, currentPage === totalPages, false),
        button('>|', totalPages, currentPage === totalPages, false)
      ].join('');
    }

    function renderTable() {
      const filtered = sortItems(filterItems());
      const result = paginateItems(filtered);
      elements.totalCount.textContent = result.totalCount;
      elements.listBody.innerHTML = !result.pageItems.length
        ? '<tr><td colspan="14" class="center muted">조회된 라자다 분실관리 대상이 없습니다.</td></tr>'
        : result.pageItems.map(item => [
          '<tr>',
          '<td class="center"><input type="radio" name="lossSelect" class="row-check" data-id="' + item.id + '"' + (state.selectedId === item.id ? ' checked' : '') + '></td>',
          '<td>' + item.orderNo + '</td>',
          '<td>' + item.orderType + '</td>',
          '<td>' + item.sellerId + '</td>',
          '<td>' + (item.returnStatus || '-') + '</td>',
          '<td>' + (lossStatusLabel[item.lossStatus] || '-') + '</td>',
          '<td>' + (faultOwnerMap[item.faultOwner] || '-') + '</td>',
          '<td>' + item.lossConfirmDate + '</td>',
          '<td title="' + (item.lossMemo || '') + '">' + (item.lossMemo || '-') + '</td>',
          '<td class="center">' + item.elapsedDays + '일</td>',
          '<td>' + item.lynkosInboundScanDate + '</td>',
          '<td>' + item.lynkosArrivalScanDate + '</td>',
          '<td>' + item.lazadaInboundDate + '</td>',
          '<td>' + item.lynkosRecoveryScanDate + '</td>',
          '</tr>'
        ].join('')).join('');
      renderPagination(state.page, result.totalPages);
      bindDynamicEvents();
    }

    function getSelectedItem() {
      return state.items.find(item => item.id === state.selectedId);
    }

    function openConfirmModal() {
      const item = getSelectedItem();
      if (!item) {
        showToast('처리할 주문 1건을 선택해 주세요.');
        return;
      }
      if (item.lossStatus !== 'pending') {
        showToast('미확정 상태인 건만 분실확정 가능합니다.');
        return;
      }
      elements.confirmModalInfo.innerHTML =
        '<strong>주문번호:</strong> ' + item.orderNo +
        ' &nbsp;|&nbsp; <strong>판매자:</strong> ' + item.sellerId;
      elements.confirmFaultOwner.value = '';
      elements.confirmMemo.value = '';
      elements.confirmModal.classList.add('show');
    }

    function closeConfirmModal() {
      elements.confirmModal.classList.remove('show');
    }

    function submitConfirmModal() {
      const item = getSelectedItem();
      if (!item) return;
      const fault = elements.confirmFaultOwner.value;
      if (!fault) {
        showToast('분실귀책을 선택해 주세요.');
        return;
      }
      const now = new Date();
      const pad2 = function (n) { return String(n).padStart(2, '0'); };
      item.lossStatus = 'confirmed';
      item.faultOwner = fault;
      item.lossConfirmDate = now.getFullYear() + '-' + pad2(now.getMonth() + 1) + '-' + pad2(now.getDate()) + ' ' + pad2(now.getHours()) + ':' + pad2(now.getMinutes());
      item.lossMemo = elements.confirmMemo.value.trim();
      closeConfirmModal();
      showToast('분실확정 처리되었습니다. CS에서 후속 처리할 수 있습니다.');
      renderTable();
    }

    function bindDynamicEvents() {
      document.querySelectorAll('.row-check').forEach(radio => {
        radio.onchange = event => {
          state.selectedId = event.target.dataset.id;
          renderTable();
        };
      });
    }

    function resetFilters() {
      elements.orderNo.value = '';
      elements.sellerId.value = '';
      elements.orderType.value = 'all';
      elements.dateFrom.value = '';
      elements.dateTo.value = '';
      elements.lossStatusBoxes.forEach(box => { box.checked = box.value === 'all'; });
      state.page = 1;
      state.selectedId = '';
      renderTable();
      showToast('라자다 분실관리 검색 조건이 초기화되었습니다.');
    }

    function bindEvents() {
      elements.lossStatusBoxes.forEach(box => box.addEventListener('change', () => handleStatusGroup(box)));
      elements.btnSearch.addEventListener('click', () => {
        state.page = 1;
        renderTable();
        showToast('라자다 분실관리 조건으로 목록을 조회했습니다.');
      });
      elements.btnReset.addEventListener('click', resetFilters);
      elements.btnMarkConfirmed.addEventListener('click', openConfirmModal);
      elements.btnConfirmCancel.addEventListener('click', closeConfirmModal);
      elements.btnConfirmSubmit.addEventListener('click', submitConfirmModal);
      elements.confirmModal.addEventListener('click', function (event) {
        if (event.target === elements.confirmModal) closeConfirmModal();
      });
      elements.sortOrder.addEventListener('change', event => {
        state.sortOrder = event.target.value;
        state.page = 1;
        renderTable();
      });
      elements.pagination.addEventListener('click', event => {
        const button = event.target.closest('.page-btn');
        if (!button || button.disabled) return;
        state.page = Number(button.dataset.page);
        renderTable();
      });
      elements.btnExcel.addEventListener('click', () => showToast('라자다 분실관리 엑셀 다운로드는 실제 연동 시 연결됩니다.'));
    }

    function init() {
      state.items = createMockData();
      bindEvents();
      renderTable();
    }

    init();
  </script>
</body>
</html>
